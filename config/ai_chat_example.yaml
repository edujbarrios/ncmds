# ====================================
# Cost Optimization Settings
# ====================================

# Low-cost configuration (for high-traffic sites):
# model: "gpt-4o-mini"
# max_tokens: 500
# context_max_length: 4000
# temperature: 0.5

# Balanced configuration (recommended):
# model: "gpt-4o-mini"
# max_tokens: 1000
# context_max_length: 8000
# temperature: 0.7

# High-quality configuration (for professional docs):
# model: "gpt-4"
# max_tokens: 2000
# context_max_length: 12000
# temperature: 0.7

