# Example Configuration for AI Chat Feature

# This is a sample showing how to configure the AI Chat feature
# Copy the ai_chat section to your config/config.yaml file

ai_chat:
  # Enable/disable the AI chat feature
  enabled: true
  
  # LLM7.io API Configuration
  # Get your API key from: https://llm7.io
  api_url: "https://llm7.io/v1/chat/completions"
  api_key: "sk-proj-xxxxxxxxxxxxxxxxxxxxxxxxxxxxx"  # Replace with your actual key
  model: "gpt-4o-mini"  # Available models: gpt-3.5-turbo, gpt-4, gpt-4o, gpt-4o-mini
  
  # UI Configuration
  ui:
    # Text displayed on the chat button
    button_text: "Ask AI"
    
    # Title of the chat window
    window_title: "Explain with AI"
    
    # Placeholder text in the input field
    placeholder: "Ask a question about this page..."
    
    # Position of the chat widget
    # Options: bottom-right, bottom-left, top-right, top-left
    position: "bottom-right"
    
    # Initial welcome message shown when chat opens
    welcome_message: "Hi! I can help you understand this page. Ask me anything about the content."
    
  # Behavior Configuration
  behavior:
    # Maximum tokens to generate in response
    # Lower values = shorter responses, Lower costs
    # Recommended: 500-2000
    max_tokens: 1000
    
    # Temperature for response generation (0.0-2.0)
    # Lower = more focused and deterministic
    # Higher = more creative and varied
    # Recommended: 0.5-0.9 for documentation
    temperature: 0.7
    
    # Maximum characters from page content to send as context
    # Longer context = better understanding but higher costs
    # Recommended: 5000-10000
    context_max_length: 8000
    
    # System prompt that guides the AI's behavior
    # Customize this to match your documentation style
    system_prompt: "You are a helpful documentation assistant. Answer questions based on the provided documentation content. Be concise and accurate. If the answer is not in the documentation, say so. Format responses clearly with examples when appropriate."

