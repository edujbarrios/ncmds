<!-- AI Chat Widget -->
{% if config.ai_chat.enabled %}
<div id="ai-chat-widget" class="ai-chat-widget">
    <!-- Chat toggle button -->
    <button id="ai-chat-toggle" class="ai-chat-toggle" aria-label="{{ config.ai_chat.ui.button_text }}">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
            <path d="M8 10h.01M12 10h.01M16 10h.01"></path>
        </svg>
        <span>{{ config.ai_chat.ui.button_text }}</span>
    </button>
    
    <!-- Chat window -->
    <div id="ai-chat-window" class="ai-chat-window" style="display: none;">
        <!-- Chat header -->
        <div class="ai-chat-header">
            <div class="ai-chat-header-content">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="12" cy="12" r="10"></circle>
                    <path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"></path>
                    <line x1="12" y1="17" x2="12.01" y2="17"></line>
                </svg>
                <h3>{{ config.ai_chat.ui.window_title }}</h3>
            </div>
            <button id="ai-chat-close" class="ai-chat-close" aria-label="Close chat">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <line x1="18" y1="6" x2="6" y2="18"></line>
                    <line x1="6" y1="6" x2="18" y2="18"></line>
                </svg>
            </button>
        </div>
        
        <!-- Chat messages -->
        <div id="ai-chat-messages" class="ai-chat-messages">
            <div class="ai-chat-message ai-message">
                <div class="ai-chat-message-avatar">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="10"></circle>
                        <path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"></path>
                        <line x1="12" y1="17" x2="12.01" y2="17"></line>
                    </svg>
                </div>
                <div class="ai-chat-message-content">
                    <p>{{ config.ai_chat.ui.welcome_message }}</p>
                </div>
            </div>
        </div>
        
        <!-- Chat input -->
        <div class="ai-chat-input-container">
            <div class="ai-chat-input-wrapper">
                <input 
                    type="text" 
                    id="ai-chat-input" 
                    class="ai-chat-input" 
                    placeholder="{{ config.ai_chat.ui.placeholder }}"
                    autocomplete="off"
                >
                <button id="ai-chat-send" class="ai-chat-send" aria-label="Send message">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="22" y1="2" x2="11" y2="13"></line>
                        <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                    </svg>
                </button>
            </div>
            <div class="ai-chat-notice">
                AI responses may contain errors. Verify important information.
            </div>
        </div>
    </div>
</div>

<!-- Hidden container for page content (used by AI) -->
<div id="page-content-for-ai" style="display: none;">
    {{ content }}
</div>
{% endif %}
