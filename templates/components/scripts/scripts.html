<script>
    // Syntax highlighting
    hljs.highlightAll();
    
    // UI Text from config
    const uiText = {
        copyButton: "{{ config.ui_text.copy_button }}",
        copyButtonCopied: "{{ config.ui_text.copy_button_copied }}",
        themeToggleDark: "{{ config.ui_text.theme_toggle_dark }}",
        themeToggleLight: "{{ config.ui_text.theme_toggle_light }}"
    };

    // Get DOM elements
    const menuToggle = document.querySelector('.mobile-menu-toggle');
    const sidebar = document.getElementById('sidebar');
    const mainContent = document.querySelector('.main-content');
    const sidebarToggle = document.getElementById('sidebarToggle');
    const tocToggle = document.getElementById('tocToggle');
    const themeToggle = document.getElementById('themeToggle');
    const accessibilityToggle = document.getElementById('accessibilityToggle');
    const tocSidebar = document.querySelector('.toc-sidebar');

    // Mobile menu toggle
    if (menuToggle && sidebar) {
        menuToggle.addEventListener('click', () => {
            sidebar.classList.toggle('active');
        });

        // Close sidebar when clicking outside on mobile
        document.addEventListener('click', (e) => {
            if (window.innerWidth <= 768) {
                if (!sidebar.contains(e.target) && !menuToggle.contains(e.target)) {
                    sidebar.classList.remove('active');
                }
            }
        });
    }
    
    // Sidebar toggle functionality (desktop)
    if (sidebarToggle && sidebar && mainContent) {
        // Check for saved sidebar state or default to 'visible'
        const sidebarVisible = localStorage.getItem('sidebarVisible') !== 'false';
        
        if (!sidebarVisible) {
            sidebar.classList.add('hidden');
            mainContent.classList.add('sidebar-hidden');
            sidebarToggle.classList.add('active');
        }
        
        sidebarToggle.addEventListener('click', () => {
            sidebar.classList.toggle('hidden');
            mainContent.classList.toggle('sidebar-hidden');
            sidebarToggle.classList.toggle('active');
            
            const isHidden = sidebar.classList.contains('hidden');
            localStorage.setItem('sidebarVisible', !isHidden);
        });
    }
    
    // TOC toggle functionality
    if (tocToggle && tocSidebar && mainContent) {
        // Check for saved TOC state or default to 'visible'
        const tocVisible = localStorage.getItem('tocVisible') !== 'false';
        
        if (!tocVisible) {
            tocSidebar.classList.add('hidden');
            mainContent.classList.add('toc-hidden');
            tocToggle.classList.add('active');
        }
        
        tocToggle.addEventListener('click', () => {
            tocSidebar.classList.toggle('hidden');
            mainContent.classList.toggle('toc-hidden');
            tocToggle.classList.toggle('active');
            
            const isHidden = tocSidebar.classList.contains('hidden');
            localStorage.setItem('tocVisible', !isHidden);
        });
    }

    // Theme toggle functionality (dark remains the default)
    const htmlElement = document.documentElement;
    const darkThemeStylesheet = document.getElementById('hljs-theme-dark');
    const lightThemeStylesheet = document.getElementById('hljs-theme-light');
    const defaultTheme = "{{ config.theme.default | lower }}" === "light" ? "light" : "dark";
    const fontScaleStorageKey = 'fontScalePreference';

    function updateThemeToggleState(theme) {
        if (!themeToggle) {
            return;
        }

        const isLightTheme = theme === 'light';
        const sunIcon = themeToggle.querySelector('.sun-icon');
        const moonIcon = themeToggle.querySelector('.moon-icon');
        const toggleLabel = isLightTheme ? uiText.themeToggleLight : uiText.themeToggleDark;

        themeToggle.setAttribute('aria-label', toggleLabel);
        themeToggle.setAttribute('title', toggleLabel);
        themeToggle.setAttribute('aria-pressed', String(isLightTheme));

        if (sunIcon) {
            sunIcon.style.display = isLightTheme ? 'none' : 'block';
        }

        if (moonIcon) {
            moonIcon.style.display = isLightTheme ? 'block' : 'none';
        }
    }

    function applyTheme(theme, persistPreference = false) {
        const normalizedTheme = theme === 'light' ? 'light' : 'dark';
        const isLightTheme = normalizedTheme === 'light';

        htmlElement.setAttribute('data-theme', normalizedTheme);
        updateThemeToggleState(normalizedTheme);

        if (darkThemeStylesheet && lightThemeStylesheet) {
            darkThemeStylesheet.disabled = isLightTheme;
            lightThemeStylesheet.disabled = !isLightTheme;
        }

        if (persistPreference) {
            try {
                localStorage.setItem('themePreference', normalizedTheme);
            } catch (error) {
                // Ignore storage errors (private browsing, blocked storage).
            }
        }
    }

    function getInitialTheme() {
        if (!themeToggle) {
            return defaultTheme;
        }

        try {
            const savedTheme = localStorage.getItem('themePreference');
            if (savedTheme === 'light') {
                return 'light';
            }
        } catch (error) {
            return defaultTheme;
        }

        return defaultTheme;
    }

    applyTheme(getInitialTheme());

    if (themeToggle) {
        themeToggle.addEventListener('click', () => {
            const currentTheme = htmlElement.getAttribute('data-theme');
            const nextTheme = currentTheme === 'light' ? 'dark' : 'light';
            applyTheme(nextTheme, true);
        });
    }

    function updateAccessibilityToggleState(fontScale) {
        if (!accessibilityToggle) {
            return;
        }

        const isLargeText = fontScale === 'large';
        const buttonLabel = isLargeText ? 'Disable larger text' : 'Enable larger text';
        accessibilityToggle.setAttribute('aria-label', buttonLabel);
        accessibilityToggle.setAttribute('title', buttonLabel);
        accessibilityToggle.setAttribute('aria-pressed', String(isLargeText));
    }

    function applyFontScale(fontScale, persistPreference = false) {
        const normalizedFontScale = fontScale === 'large' ? 'large' : 'normal';
        htmlElement.setAttribute('data-font-scale', normalizedFontScale);
        updateAccessibilityToggleState(normalizedFontScale);

        if (persistPreference) {
            try {
                localStorage.setItem(fontScaleStorageKey, normalizedFontScale);
            } catch (error) {
                // Ignore storage errors (private browsing, blocked storage).
            }
        }
    }

    function getInitialFontScale() {
        try {
            const savedFontScale = localStorage.getItem(fontScaleStorageKey);
            if (savedFontScale === 'large') {
                return 'large';
            }
        } catch (error) {
            return 'normal';
        }

        return 'normal';
    }

    applyFontScale(getInitialFontScale());

    if (accessibilityToggle) {
        accessibilityToggle.addEventListener('click', () => {
            const currentFontScale = htmlElement.getAttribute('data-font-scale');
            const nextFontScale = currentFontScale === 'large' ? 'normal' : 'large';
            applyFontScale(nextFontScale, true);
        });
    }

    // Smooth scroll for anchor links
    document.querySelectorAll('a[href^="#"]').forEach(anchor => {
        anchor.addEventListener('click', function (e) {
            e.preventDefault();
            const target = document.querySelector(this.getAttribute('href'));
            if (target) {
                target.scrollIntoView({ behavior: 'smooth', block: 'start' });
            }
        });
    });

    // Active link highlighting
    const currentPath = window.location.pathname;
    document.querySelectorAll('.nav-link').forEach(link => {
        if (link.getAttribute('href') === currentPath) {
            link.classList.add('active');
        }
    });

    // Add copy buttons to code blocks
    document.querySelectorAll('pre > code').forEach((codeBlock) => {
        const pre = codeBlock.parentElement;
        
        // Create wrapper if not already wrapped
        if (!pre.classList.contains('code-block-wrapper')) {
            const wrapper = document.createElement('div');
            wrapper.className = 'code-block-wrapper';
            pre.parentNode.insertBefore(wrapper, pre);
            wrapper.appendChild(pre);
            
            // Create copy button
            const copyButton = document.createElement('button');
            copyButton.className = 'copy-code-button';
            copyButton.innerHTML = `
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
                    <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
                </svg>
                <span>${uiText.copyButton}</span>
            `;
            
            // Add click handler
            copyButton.addEventListener('click', async () => {
                const code = codeBlock.textContent;
                
                try {
                    await navigator.clipboard.writeText(code);
                    
                    // Show success feedback
                    copyButton.innerHTML = `
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <polyline points="20 6 9 17 4 12"></polyline>
                        </svg>
                        <span>${uiText.copyButtonCopied}</span>
                    `;
                    copyButton.classList.add('copied');
                    
                    // Reset after 2 seconds
                    setTimeout(() => {
                        copyButton.innerHTML = `
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
                                <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
                            </svg>
                            <span>${uiText.copyButton}</span>
                        `;
                        copyButton.classList.remove('copied');
                    }, 2000);
                } catch (err) {
                    console.error('Failed to copy:', err);
                }
            });
            
            wrapper.appendChild(copyButton);
        }
    });

</script>
