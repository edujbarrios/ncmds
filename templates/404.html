<!DOCTYPE html>
<html lang="{{ config.html.language }}">
{% include 'components/html/head.html' %}
<body>
    {% include 'components/html/header.html' %}

    <div class="site-container">
        <main class="main-content sidebar-hidden toc-hidden">
            <div class="content-wrapper">
                <div class="not-found-container">
                    <div class="not-found-code">404</div>
                    <h1 class="not-found-title">Page Not Found</h1>
                    <p class="not-found-message">
                        The page you are looking for does not exist or may have been moved.
                    </p>
                    <div class="not-found-actions">
                        <a href="/" class="not-found-btn not-found-btn-primary">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
                                <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
                                <polyline points="9 22 9 12 15 12 15 22"/>
                            </svg>
                            Home
                        </a>
                        <a href="/docs" class="not-found-btn not-found-btn-secondary">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
                                <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
                                <polyline points="14 2 14 8 20 8"/>
                                <line x1="16" y1="13" x2="8" y2="13"/>
                                <line x1="16" y1="17" x2="8" y2="17"/>
                                <polyline points="10 9 9 9 8 9"/>
                            </svg>
                            Documentation
                        </a>
                    </div>
                </div>
            </div>
        </main>
    </div>

    {% include 'components/html/footer.html' %}

    <style>
        .not-found-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 6rem 2rem;
            min-height: 60vh;
        }

        .not-found-code {
            font-size: 8rem;
            font-weight: 800;
            line-height: 1;
            background: linear-gradient(135deg, var(--primary-color), var(--accent-color));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 1.5rem;
            filter: drop-shadow(0 0 24px color-mix(in srgb, var(--primary-color) 40%, transparent));
        }

        .not-found-title {
            font-size: 2rem;
            font-weight: 700;
            color: var(--text-color);
            margin-bottom: 1rem;
        }

        .not-found-message {
            font-size: 1.1rem;
            color: var(--text-secondary);
            max-width: 480px;
            margin-bottom: 2.5rem;
            line-height: 1.6;
        }

        .not-found-actions {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
            justify-content: center;
        }

        .not-found-btn {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.75rem 1.5rem;
            border-radius: 8px;
            font-size: 0.95rem;
            font-weight: 600;
            text-decoration: none;
            transition: all 0.25s ease;
        }

        .not-found-btn-primary {
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            color: #fff;
            box-shadow: 0 4px 14px color-mix(in srgb, var(--primary-color) 40%, transparent);
        }

        .not-found-btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px color-mix(in srgb, var(--primary-color) 55%, transparent);
        }

        .not-found-btn-secondary {
            background: var(--surface-color);
            color: var(--text-color);
            border: 1px solid var(--border-color);
        }

        .not-found-btn-secondary:hover {
            border-color: var(--primary-color);
            color: var(--primary-color);
            transform: translateY(-2px);
        }
    </style>

    {% include 'components/scripts/scripts.html' %}
</body>
</html>
